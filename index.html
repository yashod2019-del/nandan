<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Law Reader Pro - Full Scan</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .status-layer { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.85); padding: 20px; text-align: center; color: #f1c40f; font-weight: bold; font-size: 20px; z-index: 10; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <div class="status-layer" id="status">Loading...</div>

<script>
    const video = document.getElementById('video');
    const statusDiv = document.getElementById('status');
    let synth = window.speechSynthesis;
    let worker = null;

    async function initOCR() {
        statusDiv.innerText = "Setting up AI...";
        worker = await Tesseract.createWorker('eng+tel', 1);
        
        // తెలుగు అక్షరాల ఖచ్చితత్వం కోసం ఆప్టిమైజ్ చేసిన సెట్టింగ్స్
        await worker.setParameters({
            tessedit_pageseg_mode: Tesseract.PSM.AUTO_OSD, 
            tessjs_create_pdf: '0',
            user_defined_dpi: '300'
        });
        
        statusDiv.innerText = "Ready to Read Full Page!";
        setInterval(scanPage, 2500);
    }

    async function scanPage() {
        if (synth.speaking || !worker) return;
        
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        statusDiv.innerText = "Scanning...";
        const { data } = await worker.recognize(canvas);
        
        // పేజీ మొత్తం చదవడానికి కండిషన్
        if (data.text.trim().length > 20) {
            statusDiv.innerText = "Reading Full Page...";
            readAloud(data.text);
        }
    }

    function readAloud(text) {
        synth.cancel();
        // తెలుగు అక్షరాల స్పష్టత కోసం ఫిల్టర్
        let cleanText = text.replace(/[^a-zA-Z0-9\u0C00-\u0C7F\s.,-]/g, " ");
        let utterance = new SpeechSynthesisUtterance(cleanText);
        
        utterance.lang = /[\u0C00-\u0C7F]/.test(cleanText) ? "te-IN" : "en-US";
        // తెలుగు అక్షరాలను తప్పులు లేకుండా చదవడానికి స్పీడ్ తగ్గించాను
        utterance.rate = /[\u0C00-\u0C7F]/.test(cleanText) ? 0.75 : 0.85; 
        
        synth.speak(utterance);
    }

    navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}}).then(stream => {
        video.srcObject = stream;
        initOCR();
    });
</script>
</body>
</html>
